name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and verify client
        working-directory: client
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run lint
          npm run format:check
          npm run test -- --run

      - name: Install and verify server
        working-directory: server
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run lint
          npm run format:check
          npm test
